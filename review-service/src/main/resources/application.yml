spring:
  application:
    name: review-service
  data:
    mongodb:
      uri: mongodb://localhost:27017
      database: dbfirst

server:
  port: 9007

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://gpadmin:1234@localhost:8761/eureka

# Optional: actuator 등록 (모니터링용)
management:
  endpoints:
    web:
      exposure:
        include: "*"
